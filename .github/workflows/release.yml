# À chaque tag du type v1.2.0 : build + archive dist/ jointe à la release GitHub.
name: Release (archive dist)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  attach-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Créer une zip du contenu de dist/ (équivalent du dossier dist en local)
        run: |
          cd dist
          zip -r "../moonlight-dist-${{ github.ref_name }}.zip" .

      - name: Publier la release avec la pièce jointe
        uses: softprops/action-gh-release@v2
        with:
          files: moonlight-dist-${{ github.ref_name }}.zip
          generate_release_notes: true
