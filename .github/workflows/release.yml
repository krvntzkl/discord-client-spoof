# On tag v*: build, pack asar, attach dist zip + clientSpoof.asar to the GitHub Release.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  attach-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run repo

      - name: Zip dist/ (same layout as local Moonbase "dist" search path)
        run: |
          cd dist
          zip -r "../moonlight-dist-${{ github.ref_name }}.zip" .

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            moonlight-dist-${{ github.ref_name }}.zip
            repo/clientSpoof.asar
          generate_release_notes: true
